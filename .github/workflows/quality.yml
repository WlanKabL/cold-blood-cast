name: Quality

on:
    workflow_call:

jobs:
    quality:
        name: Code Quality
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup

            - name: Generate Prisma client
              run: pnpm --filter @cold-blood-cast/backend db:generate

            - name: Restore ESLint cache
              uses: actions/cache@v4
              with:
                  path: |
                      apps/backend/.eslintcache
                      apps/frontend/.eslintcache
                  key: eslint-${{ runner.os }}-${{ hashFiles('**/eslint.config.*') }}-${{ github.sha }}
                  restore-keys: |
                      eslint-${{ runner.os }}-${{ hashFiles('**/eslint.config.*') }}-

            - name: Prettier check
              run: pnpm format

            - name: ESLint
              run: pnpm lint

            - name: TypeScript check
              run: pnpm types:check
