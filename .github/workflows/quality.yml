name: Quality

on:
    workflow_call:

jobs:
    quality:
        name: Lint, Format & Types
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup
              uses: ./.github/actions/setup

            - name: Prettier check
              run: pnpm format

            - name: ESLint check
              run: pnpm lint

            - name: TypeScript check
              run: pnpm types:check
