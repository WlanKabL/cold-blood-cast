name: E2E Tests

on:
    workflow_call:

jobs:
    e2e:
        name: Playwright E2E (${{ matrix.shard }}/${{ strategy.job-total }})
        runs-on: ubuntu-latest
        timeout-minutes: 15

        strategy:
            fail-fast: false
            matrix:
                shard: [1, 2, 3, 4]

        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup

            - name: Prepare Nuxt
              run: pnpm --filter @cold-blood-cast/frontend postinstall

            - name: Install Playwright browsers
              run: pnpm --filter @cold-blood-cast/frontend exec playwright install --with-deps chromium

            - name: Run E2E tests (shard ${{ matrix.shard }}/4)
              run: pnpm --filter @cold-blood-cast/frontend exec playwright test --shard=${{ matrix.shard }}/4
              env:
                  CI: true

            - name: Upload blob report
              if: ${{ !cancelled() }}
              uses: actions/upload-artifact@v4
              with:
                  name: blob-report-${{ matrix.shard }}
                  path: apps/frontend/blob-report/
                  retention-days: 3

    merge-reports:
        name: Merge Playwright Reports
        needs: e2e
        if: ${{ !cancelled() }}
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup

            - name: Download all blob reports
              uses: actions/download-artifact@v4
              with:
                  pattern: blob-report-*
                  path: all-blob-reports
                  merge-multiple: true

            - name: Merge into HTML report
              run: pnpm --filter @cold-blood-cast/frontend exec playwright merge-reports --reporter=html "$GITHUB_WORKSPACE/all-blob-reports"
              env:
                  PLAYWRIGHT_HTML_OUTPUT_FOLDER: ${{ github.workspace }}/apps/frontend/playwright-report

            - name: Upload HTML report
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: apps/frontend/playwright-report/
                  retention-days: 14
