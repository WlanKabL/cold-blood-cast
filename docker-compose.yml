services:
    postgres:
        image: postgres:16-alpine
        container_name: cbc-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-coldblood}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coldblood}
            POSTGRES_DB: ${POSTGRES_DB:-coldbloodcast}
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-coldblood} -d ${POSTGRES_DB:-coldbloodcast}",
                ]
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        profiles: [deploy]
        build:
            context: .
            dockerfile: apps/backend/Dockerfile
        container_name: cbc-backend
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
        ports:
            - "${PORT:-3001}:3001"
        environment:
            PORT: 3001
            NODE_ENV: production
            DATABASE_URL: postgresql://${POSTGRES_USER:-coldblood}:${POSTGRES_PASSWORD:-coldblood}@postgres:5432/${POSTGRES_DB:-coldbloodcast}
            DATA_DIR: /app/data
            CORS_ORIGINS: ${CORS_ORIGINS:-*}
            JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
            JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
            PEPPER: ${PEPPER}
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
            DISABLE_TELEGRAM_BOT: ${DISABLE_TELEGRAM_BOT:-false}
            HOME_ASSISTANT_URL: ${HOME_ASSISTANT_URL:-http://homeassistant.local:8123}
            HOME_ASSISTANT_TOKEN: ${HOME_ASSISTANT_TOKEN:-placeholder}
        volumes:
            - backend_data:/app/data

    frontend:
        profiles: [deploy]
        build:
            context: .
            dockerfile: apps/frontend/Dockerfile
        container_name: cbc-frontend
        restart: unless-stopped
        depends_on:
            - backend
        ports:
            - "${FRONTEND_PORT:-3000}:3000"
        environment:
            NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:3001}

volumes:
    postgres_data:
    backend_data:
